name: Deploy Host Web

on:
  push:
    branches: [ feat/#2-cicd ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 리포지토리 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Node.js 환경 세팅 (버전 명시 — 없으면 npm ci 실패할 수 있음)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ React 빌드
      - name: Build React app
        run: |
          npm ci
          npm run build
          ls -al dist  # ✅ build 폴더 생성 확인용 (디버깅용)

      # 4️⃣ EC2로 빌드 파일 업로드
      - name: Deploy build files to EC2
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/host"
          overwrite: true   # ✅ 기존 파일 덮어쓰기 허용

      # 5️⃣ Nginx 설정 테스트 및 리로드
      - name: Reload Nginx on EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo nginx -t
            sudo systemctl reload nginx
